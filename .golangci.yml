version: "2"

linters:
  default: standard
  enable:
    # Security
    - gosec
    - gocritic
    - bodyclose
    - noctx

    # Correctness
    - unconvert
    - wastedassign
    - reassign

  settings:
    gosec:
      excludes: []
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

formatters:
  enable:
    - gofumpt




